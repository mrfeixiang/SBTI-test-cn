<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI 人格测试</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- 开始页 -->
  <div id="start-page" class="page show">
    <h1>SBTI 人格测试</h1>
    <p>超火的趣味人格测试，测测你是哪种类型</p>
    <button id="start-btn">开始测试</button>
  </div>

  <!-- 答题页 -->
  <div id="quiz-page" class="page">
    <div class="progress">
      第 <span id="current-num">1</span> 题 / 共 <span id="total-num">0</span> 题
    </div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="nav-btns">
      <button id="prev-btn" disabled>上一题</button>
      <button id="next-btn">下一题</button>
    </div>
  </div>

  <!-- 结果页 -->
  <div id="result-page" class="page">
    <h2>你的测试结果</h2>
    <div class="result-box">
      <div class="result-type" id="result-type"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>
    <button id="restart-btn">重新测试</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
